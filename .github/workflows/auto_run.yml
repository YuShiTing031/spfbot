name: Daily Stock Report
on:
  schedule:
    - cron: '30 07 * * 1-5' # 台灣時間 15:30 執行 (UTC+8)
  workflow_dispatch: # 允許手動觸發

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          pip install requests beautifulsoup4 pymupdf easyocr numpy torch torchvision
      - name: Run script
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }} # ⚠️ 安全起見，網址存在 Secrets
        run: python main.py
