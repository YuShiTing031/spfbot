name: Auto Fetch Share Report

on:
  schedule:
    - cron: '15 10 * * *'  # 台灣時間 18:15
  workflow_dispatch:      # 允許你手動按鈕執行測試

jobs:
  run-spider:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # 更新為 libgl1，解決舊套件無法安裝的問題
          sudo apt-get install -y libgl1 poppler-utils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # 確保你的 requirements.txt 包含 easyocr, pymupdf, torch 等
          pip install -r requirements.txt

      - name: Run script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          # 先進入 spfbot 資料夾，確保程式讀取路徑正確
          cd spfbot
          python main.py
